<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hack Smarter | Learning Paths</title>
    <meta name="description" content="Structured learning paths for Hack Smarter. Choose your journey — Active Directory, Web Hacking, OSCP Prep, AWS, and more.">
    <meta name="darkreader-lock">
    
    <meta property="og:title" content="Hack Smarter | Learning Paths">
    <meta property="og:description" content="Curated learning journeys for realistic hacking labs and courses.">
    <meta property="og:url" content="https://paths.hacksmarter.org">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-elements">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="grid-overlay"></div>
    </div>

    <nav class="top-nav">
        <a href="https://hacksmarter.org" class="return-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
            Return to Hack Smarter
        </a>
    </nav>

    <header class="header">
        <div class="container">
            <h1 class="logo-text">HACK SMARTER <span class="badge">PATHS</span></h1>
            <p class="subtitle">Curated learning journeys for realistic hacking labs and courses.</p>
        </div>
    </header>

    <main class="container">
        <div class="paths-grid" id="paths-grid">
            <!-- Cards injected via JS -->
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; <script>document.write(new Date().getFullYear())</script> Hack Smarter. Backed by a free community.</p>
        </div>
    </footer>

    <script src="paths-data.js"></script>
    <script>
        const ICONS = {
            shield: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/></svg>`,
            globe: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>`,
            award: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15.477 12.89 1.515 8.526a.5.5 0 0 1-.81.47l-3.58-2.687a1 1 0 0 0-1.197 0l-3.586 2.686a.5.5 0 0 1-.81-.469l1.514-8.526"/><circle cx="12" cy="8" r="6"/></svg>`,
            cloud: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></svg>`,
            gift: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="4" rx="1"/><path d="M12 8v13"/><path d="M19 12v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-7"/><path d="M7.5 8a2.5 2.5 0 0 1 0-5A4.8 8 0 0 1 12 8a4.8 8 0 0 1 4.5-5 2.5 2.5 0 0 1 0 5"/></svg>`,
            monitor: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="3" rx="2"/><line x1="8" x2="16" y1="21" y2="21"/><line x1="12" x2="12" y1="17" y2="21"/></svg>`,
            terminal: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" x2="20" y1="19" y2="19"/></svg>`
        };

        const ARROW = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>`;

        const grid = document.getElementById('paths-grid');

        PATHS_DATA.forEach(path => {
            const card = document.createElement('a');
            card.href = `/${path.id}/`;
            card.className = 'path-card';
            card.style.setProperty('--card-accent', path.color);
            card.style.setProperty('--card-accent-light', path.colorLight);
            card.id = `path-${path.id}`;

            card.innerHTML = `
                <div class="card-icon">${ICONS[path.icon]}</div>
                <h2 class="card-title">${path.title}</h2>
                <p class="card-desc">${path.description}</p>
                <div class="card-meta">
                    <span class="meta-pill">${path.modules} modules</span>
                    <span class="meta-pill">${path.difficultyRange}</span>
                </div>
                <div class="card-arrow">${ARROW}</div>
            `;

            grid.appendChild(card);
        });
    </script>
</body>
</html>
